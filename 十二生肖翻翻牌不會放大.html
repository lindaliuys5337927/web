<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>十二生肖閩南語配對遊戲</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --bg-color: #f0f8ff;
            --card-bg: #fff;
            --card-back: #ff9800;
            --text-color: #333;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            box-sizing: border-box;
            /* 關鍵修正 1：改用 manipulation，明確告訴瀏覽器這裡只有單擊，取消雙擊放大的等待時間 */
            touch-action: manipulation; 
        }

        html, body {
            width: 100%;
            height: 100%;
            height: 100dvh; 
            margin: 0;
            padding: 0;
            overflow: hidden; 
            position: fixed; 
            background-color: var(--bg-color);
        }

        .game-container {
            width: 100%;
            height: 100%;
            padding: 10px 15px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--text-color);
            margin: 5px 0;
            font-size: clamp(20px, 4vmin, 26px);
            text-align: center;
        }

        .timer-display {
            font-size: clamp(24px, 5vmin, 36px);
            font-weight: bold;
            color: #d32f2f;
            background-color: #ffebee;
            padding: 4px 30px;
            border-radius: 30px;
            margin: 5px auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            letter-spacing: 2px;
            border: 2px solid #ffcdd2;
        }

        .info-panel {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 900px;
            margin-bottom: 10px;
            font-size: clamp(14px, 3vmin, 18px);
            font-weight: bold;
            color: #555;
        }

        .game-board {
            flex: 1 1 auto;
            min-height: 0; 
            width: 100%;
            max-width: 1000px;
            display: grid;
            gap: 10px;
            perspective: 1000px;
            padding-bottom: 5px;
        }

        @media (orientation: landscape) {
            .game-board {
                grid-template-columns: repeat(6, 1fr);
                grid-template-rows: repeat(4, 1fr);
            }
        }

        @media (orientation: portrait) {
            .game-board {
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: repeat(6, 1fr);
            }
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 10px;
            touch-action: none; /* 卡片區域絕對禁止任何手勢滑動與縮放 */
        }

        .card.flip {
            transform: rotateY(180deg);
        }

        .card.matched {
            cursor: default;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 10px;
            border: 2px solid #ddd;
        }

        .card-front {
            background-color: var(--card-bg);
            color: var(--text-color);
            transform: rotateY(180deg);
            padding: 5px;
            text-align: center;
        }

        .card-front.type-hanzi { color: #2196F3; font-size: clamp(24px, 6vmin, 42px); }
        .card-front.type-pinyin { color: #E91E63; font-size: clamp(16px, 4.5vmin, 32px); }

        .card-back {
            background-color: var(--card-back);
            background-image: radial-gradient(#fff3e0 15%, transparent 16%), radial-gradient(#fff3e0 15%, transparent 16%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            border: 2px solid #e65100;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            width: 80%;
            max-width: 400px;
        }

        .modal-content h2 { color: var(--primary-color); margin-top: 0; font-size: clamp(22px, 5vw, 28px); }
        .modal-content p { font-size: clamp(16px, 4vw, 20px); font-weight: bold; color: #333;}
        .highlight-time { color: #d32f2f; font-size: clamp(24px, 6vw, 32px); }
        
        button {
            padding: 12px 24px;
            font-size: clamp(18px, 4vw, 22px);
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            width: 100%;
            touch-action: manipulation;
        }

        button:active { background-color: #388E3C; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>十二生肖閩南語配對</h1>
    
    <div class="timer-display" id="timer">00:00</div>

    <div class="info-panel">
        <div id="matches">配對進度: 0 / 12</div>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2>太棒了！過關！</h2>
            <p>你的完成時間是：<br><span class="highlight-time" id="finalTime"></span></p>
            <button onclick="startGame()">再挑戰一次</button>
        </div>
    </div>
</div>

    <script>
        // --- 強制封鎖平板的干擾手勢 ---
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            let now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault(); 
            }
            lastTouchEnd = now;
        }, { passive: false });

        // 雙保險：攔截原生的 dblclick 事件
        document.addEventListener('dblclick', function(e) {
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('dragstart', function(e) { 
            e.preventDefault(); 
        });
        // -----------------------------

        const zodiacData = [
            { id: 1, hanzi: '鼠', pinyin: 'tshí' },
            { id: 2, hanzi: '牛', pinyin: 'gû' },
            { id: 3, hanzi: '虎', pinyin: 'hóo' },
            { id: 4, hanzi: '兔', pinyin: 'thòo' },
            { id: 5, hanzi: '龍', pinyin: 'lîng' },
            { id: 6, hanzi: '蛇', pinyin: 'tsuâ' },
            { id: 7, hanzi: '馬', pinyin: 'bé' },
            { id: 8, hanzi: '羊', pinyin: 'iûnn' },
            { id: 9, hanzi: '猴', pinyin: 'kâu' },
            { id: 10, hanzi: '雞', pinyin: 'ke' },
            { id: 11, hanzi: '狗', pinyin: 'káu' },
            { id: 12, hanzi: '豬', pinyin: 'ti' }
        ];

        const gameBoard = document.getElementById('gameBoard');
        const timerDisplay = document.getElementById('timer');
        const matchesDisplay = document.getElementById('matches');
        const winModal = document.getElementById('winModal');
        const finalTimeDisplay = document.getElementById('finalTime');

        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let matchesCount = 0;
        
        let totalSeconds = 0;
        let timerInterval = null;
        let gameStarted = false;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'flip') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'match') {
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'win') {
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
                oscillator.frequency.setValueAtTime(500, audioCtx.currentTime + 0.1);
                oscillator.frequency.setValueAtTime(600, audioCtx.currentTime + 0.2);
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.6);
            }
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function startGame() {
            gameBoard.innerHTML = '';
            winModal.style.display = 'none';
            matchesCount = 0;
            totalSeconds = 0;
            gameStarted = false;
            hasFlippedCard = false;
            lockBoard = false;
            firstCard = null;
            secondCard = null;
            clearInterval(timerInterval);
            timerDisplay.textContent = '00:00';
            matchesDisplay.textContent = `配對進度: 0 / 12`;

            let cardDeck = [];
            zodiacData.forEach(item => {
                cardDeck.push({ pairId: item.id, text: item.hanzi, type: 'hanzi' });
                cardDeck.push({ pairId: item.id, text: item.pinyin, type: 'pinyin' });
            });

            for (let i = cardDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cardDeck[i], cardDeck[j]] = [cardDeck[j], cardDeck[i]];
            }

            cardDeck.forEach(cardItem => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('card');
                cardElement.dataset.pairId = cardItem.pairId;
                
                cardElement.innerHTML = `
                    <div class="card-face card-front type-${cardItem.type}">${cardItem.text}</div>
                    <div class="card-face card-back"></div>
                `;
                
                // 關鍵修正 2：改用觸控專屬的 touchstart 事件，從最底層攔截動作
                cardElement.addEventListener('touchstart', flipCard, { passive: false });
                // 保留 mousedown 讓電腦滑鼠也能玩
                cardElement.addEventListener('mousedown', flipCard);
                
                gameBoard.appendChild(cardElement);
            });
        }

        function startTimer() {
            if (!gameStarted) {
                gameStarted = true;
                timerInterval = setInterval(() => {
                    totalSeconds++;
                    timerDisplay.textContent = formatTime(totalSeconds);
                }, 1000);
            }
        }

        function flipCard(e) {
            // 關鍵修正 3：立刻中斷原生的觸控事件，徹底切斷瀏覽器判斷「雙擊放大」的可能
            if (e && e.cancelable) {
                e.preventDefault();
            }

            startTimer();
            if (lockBoard) return;
            if (this === firstCard) return;

            playSound('flip');
            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;

            if (isMatch) {
                disableCards();
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            firstCard.removeEventListener('touchstart', flipCard);
            firstCard.removeEventListener('mousedown', flipCard);
            secondCard.removeEventListener('touchstart', flipCard);
            secondCard.removeEventListener('mousedown', flipCard);
            
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            
            firstCard.querySelector('.card-front').style.backgroundColor = '#e8f5e9';
            secondCard.querySelector('.card-front').style.backgroundColor = '#e8f5e9';

            playSound('match');

            matchesCount++;
            matchesDisplay.textContent = `配對進度: ${matchesCount} / 12`;

            resetBoard();

            if (matchesCount === 12) {
                setTimeout(gameWon, 600);
            }
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        function gameWon() {
            clearInterval(timerInterval);
            playSound('win');
            finalTimeDisplay.textContent = formatTime(totalSeconds);
            winModal.style.display = 'flex';
        }

        startGame();
    </script>
</body>
</html>
