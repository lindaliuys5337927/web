<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>十二生肖閩南語配對遊戲</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --bg-color: #f0f8ff;
            --card-bg: #fff;
            --card-back: #ff9800;
            --text-color: #333;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden; 
            touch-action: none; 
        }

        h1 {
            color: var(--text-color);
            margin: 5px 0 10px 0;
            font-size: 26px;
            text-align: center;
        }

        /* 新增：獨立在中上方的計時器面板 */
        .timer-display {
            font-size: 36px;
            font-weight: bold;
            color: #d32f2f;
            background-color: #ffebee;
            padding: 8px 30px;
            border-radius: 30px;
            margin: 0 auto 10px auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            letter-spacing: 2px;
            border: 2px solid #ffcdd2;
        }

        .info-panel {
            display: flex;
            justify-content: center; /* 改為置中，因為計時器已經獨立出去了 */
            width: 100%;
            max-width: 900px;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #555;
            padding: 0 10px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 1000px;
            flex-grow: 1;
            perspective: 1000px;
            padding-bottom: 10px;
        }

        @media (max-width: 768px) and (orientation: portrait) {
            .game-board {
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: repeat(6, 1fr);
            }
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 12px;
        }

        .card.flip {
            transform: rotateY(180deg);
        }

        .card.matched {
            cursor: default;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 12px;
            border: 2px solid #ddd;
        }

        .card-front {
            background-color: var(--card-bg);
            color: var(--text-color);
            transform: rotateY(180deg);
            padding: 5px;
            text-align: center;
        }

        .card-front.type-hanzi { color: #2196F3; font-size: 36px; }
        .card-front.type-pinyin { color: #E91E63; font-size: 28px; }

        .card-back {
            background-color: var(--card-back);
            background-image: radial-gradient(#fff3e0 15%, transparent 16%), radial-gradient(#fff3e0 15%, transparent 16%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            border: 2px solid #e65100;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .modal-content h2 { color: var(--primary-color); margin-top: 0; }
        .modal-content p { font-size: 20px; font-weight: bold; color: #333;}
        .highlight-time { color: #d32f2f; font-size: 28px; }
        
        button {
            padding: 15px 30px;
            font-size: 22px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }

        button:active { background-color: #388E3C; }
    </style>
</head>
<body>

    <h1>十二生肖閩南語配對</h1>
    
    <div class="timer-display" id="timer">00:00</div>

    <div class="info-panel">
        <div id="matches">配對進度: 0 / 12</div>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2>太棒了！過關！</h2>
            <p>你的完成時間是：<br><span class="highlight-time" id="finalTime"></span></p>
            <button onclick="startGame()">再挑戰一次</button>
        </div>
    </div>

    <script>
        const zodiacData = [
            { id: 1, hanzi: '鼠', pinyin: 'tshí' },
            { id: 2, hanzi: '牛', pinyin: 'gû' },
            { id: 3, hanzi: '虎', pinyin: 'hóo' },
            { id: 4, hanzi: '兔', pinyin: 'thòo' },
            { id: 5, hanzi: '龍', pinyin: 'lîng' },
            { id: 6, hanzi: '蛇', pinyin: 'tsuâ' },
            { id: 7, hanzi: '馬', pinyin: 'bé' },
            { id: 8, hanzi: '羊', pinyin: 'iûnn' },
            { id: 9, hanzi: '猴', pinyin: 'kâu' },
            { id: 10, hanzi: '雞', pinyin: 'ke' },
            { id: 11, hanzi: '狗', pinyin: 'káu' },
            { id: 12, hanzi: '豬', pinyin: 'ti' }
        ];

        const gameBoard = document.getElementById('gameBoard');
        const timerDisplay = document.getElementById('timer');
        const matchesDisplay = document.getElementById('matches');
        const winModal = document.getElementById('winModal');
        const finalTimeDisplay = document.getElementById('finalTime');

        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let matchesCount = 0;
        
        let totalSeconds = 0;
        let timerInterval = null;
        let gameStarted = false;

        // 格式化時間 (MM:SS)
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function startGame() {
            gameBoard.innerHTML = '';
            winModal.style.display = 'none';
            matchesCount = 0;
            totalSeconds = 0;
            gameStarted = false;
            hasFlippedCard = false;
            lockBoard = false;
            firstCard = null;
            secondCard = null;
            clearInterval(timerInterval);
            timerDisplay.textContent = '00:00';
            matchesDisplay.textContent = `配對進度: 0 / 12`;

            let cardDeck = [];
            zodiacData.forEach(item => {
                cardDeck.push({ pairId: item.id, text: item.hanzi, type: 'hanzi' });
                cardDeck.push({ pairId: item.id, text: item.pinyin, type: 'pinyin' });
            });

            // 升級洗牌演算法：Fisher-Yates Shuffle，保證每次排列絕對隨機
            for (let i = cardDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cardDeck[i], cardDeck[j]] = [cardDeck[j], cardDeck[i]];
            }

            cardDeck.forEach(cardItem => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('card');
                cardElement.dataset.pairId = cardItem.pairId;
                
                cardElement.innerHTML = `
                    <div class="card-face card-front type-${cardItem.type}">${cardItem.text}</div>
                    <div class="card-face card-back"></div>
                `;
                
                cardElement.addEventListener('pointerdown', flipCard);
                gameBoard.appendChild(cardElement);
            });
        }

        function startTimer() {
            if (!gameStarted) {
                gameStarted = true;
                timerInterval = setInterval(() => {
                    totalSeconds++;
                    timerDisplay.textContent = formatTime(totalSeconds);
                }, 1000);
            }
        }

        function flipCard(e) {
            startTimer();
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.pairId === secondCard.dataset.pairId;

            if (isMatch) {
                disableCards();
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            firstCard.removeEventListener('pointerdown', flipCard);
            secondCard.removeEventListener('pointerdown', flipCard);
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            
            firstCard.querySelector('.card-front').style.backgroundColor = '#e8f5e9';
            secondCard.querySelector('.card-front').style.backgroundColor = '#e8f5e9';

            matchesCount++;
            matchesDisplay.textContent = `配對進度: ${matchesCount} / 12`;

            resetBoard();

            if (matchesCount === 12) {
                setTimeout(gameWon, 600);
            }
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        function gameWon() {
            clearInterval(timerInterval);
            finalTimeDisplay.textContent = formatTime(totalSeconds);
            winModal.style.display = 'flex';
        }

        document.addEventListener('dragstart', function(e) { e.preventDefault(); });

        startGame();
    </script>
</body>
</html>
